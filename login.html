<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haulxify — Customer Portal Sign In</title>
  <link rel="icon" type="image/webp" href="images/logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand-orange: #E87722;
      --brand-navy:   #0D1929;
      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
    }

    html, body { height: 100%; font-family: var(--font-body); }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background-color: #f0f4f8;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(232,119,34,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(13,25,41,0.04) 0%, transparent 50%);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow: 0 32px 80px rgba(10,18,30,0.18);
      animation: cardIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.93) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-header { margin-bottom: 28px; }

    .logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--brand-navy);
      text-decoration: none;
      letter-spacing: -0.03em;
      display: inline-block;
    }
    .logo span { color: var(--brand-orange); }

    .card-subtitle {
      margin: 8px 0 0;
      font-size: 0.875rem;
      color: rgba(13,25,41,0.5);
    }

    .alert-box {
      display: none;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.8125rem;
      align-items: center;
      gap: 8px;
    }
    .alert-box.show { display: flex; }
    .alert-box.error { background: #fff1f0; border: 1px solid #fca5a5; color: #dc2626; }
    .alert-box.success { background: #f0fdf4; border: 1px solid #86efac; color: #16a34a; }

    .form-fields { display: flex; flex-direction: column; gap: 16px; }

    .field-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--brand-navy);
      font-family: var(--font-display);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .field-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .forgot-link {
      font-size: 0.78rem;
      color: var(--brand-orange);
      text-decoration: none;
      cursor: pointer;
      transition: text-decoration 0.2s;
    }
    .forgot-link:hover { text-decoration: underline; }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: rgba(13,25,41,0.35);
      display: flex;
      align-items: center;
    }

    .field-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid rgba(13,25,41,0.12);
      border-radius: 10px;
      font-size: 0.875rem;
      font-family: var(--font-body);
      color: var(--brand-navy);
      outline: none;
      background: #f9fafb;
      transition: border-color 0.2s, background 0.2s;
    }
    .field-input:focus { border-color: var(--brand-orange); background: #fff; }
    .field-input::placeholder { color: rgba(13,25,41,0.35); }
    .field-input.pw-input { padding-right: 42px; }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: rgba(13,25,41,0.35);
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--brand-navy); }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.8125rem;
      color: rgba(13,25,41,0.5);
      margin-top: -4px;
    }
    .remember-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--brand-orange);
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-signin {
      width: 100%;
      padding: 14px;
      background: var(--brand-navy);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: var(--font-display);
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-signin:hover:not(:disabled) { background: #1a3358; transform: translateY(-1px); }
    .btn-signin:active:not(:disabled) { transform: translateY(0); }
    .btn-signin:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .btn-signin.loading .spinner { display: block; }
    .btn-signin.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 18px;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(13,25,41,0.08); }
    .divider-text { font-size: 0.75rem; color: rgba(13,25,41,0.35); white-space: nowrap; }

    .get-started-link {
      display: block;
      text-align: center;
      padding: 12px;
      border: 1.5px solid rgba(13,25,41,0.12);
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: var(--font-display);
      color: var(--brand-navy);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .get-started-link:hover { border-color: var(--brand-orange); color: var(--brand-orange); }

    /* ── FORGOT MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10,18,30,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .modal-card {
      position: relative;
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px 28px;
      box-shadow: 0 24px 64px rgba(10,18,30,0.22);
      animation: cardIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(13,25,41,0.06);
      border: none;
      border-radius: 8px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(13,25,41,0.12); }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brand-navy);
      margin-bottom: 6px;
    }
    .modal-subtitle {
      font-size: 0.8125rem;
      color: rgba(13,25,41,0.5);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .btn-reset {
      width: 100%;
      padding: 13px;
      background: var(--brand-navy);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 700;
      font-family: var(--font-display);
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-reset:hover:not(:disabled) { background: #1a3358; }
    .btn-reset:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn-reset.loading .spinner { display: block; }
    .btn-reset.loading .btn-label { display: none; }

    @media (max-width: 480px) {
      .login-card { padding: 32px 22px 28px; border-radius: 16px; }
      .modal-card { padding: 28px 20px 24px; }
    }
  </style>
</head>
<body>

  <div class="login-card">

    <div class="card-header">
      <a href="https://www.haulxify.com" class="logo">Haul<span>xify</span></a>
      <p class="card-subtitle">Customer Portal — Sign in to your account</p>
    </div>

    <div class="alert-box error" id="signin-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="signin-error-msg">Invalid email or password.</span>
    </div>

    <div class="form-fields">

      <div>
        <label class="field-label">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <input id="signin-email" type="email" class="field-input" placeholder="you@company.com" autocomplete="email">
        </div>
      </div>

      <div>
        <div class="field-label-row">
          <label class="field-label" style="margin-bottom:0;">Password</label>
          <span class="forgot-link" onclick="openForgot()">Forgot password?</span>
        </div>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input id="signin-password" type="password" class="field-input pw-input" placeholder="••••••••" autocomplete="current-password">
          <button class="pw-toggle" type="button" onclick="togglePw()" aria-label="Toggle password">
            <svg id="pw-eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <label class="remember-row">
        <input type="checkbox" id="signin-remember">
        Keep me signed in
      </label>

      <button class="btn-signin" id="signin-btn" onclick="handleSignIn()">
        <div class="spinner"></div>
        <span class="btn-label">Sign In to Customer Portal</span>
      </button>

    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Not a customer yet?</span>
      <div class="divider-line"></div>
    </div>

    <a href="https://www.haulxify.com/contact.html" class="get-started-link">
      Get Started — Contact Us →
    </a>

  </div>

  <!-- ── FORGOT PASSWORD MODAL ── -->
  <div class="modal-overlay" id="forgot-overlay">
    <div class="modal-backdrop" onclick="closeForgot()"></div>
    <div class="modal-card">

      <button class="modal-close" onclick="closeForgot()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div id="reset-form-wrap">
        <p class="modal-title">Reset your password</p>
        <p class="modal-subtitle">Enter your email and we'll send you a reset link right away.</p>

        <div class="alert-box error" id="reset-error">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="reset-error-msg"></span>
        </div>

        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <input id="reset-email" type="email" class="field-input" placeholder="you@company.com" autocomplete="email">
        </div>

        <button class="btn-reset" id="reset-btn" onclick="sendReset()">
          <div class="spinner"></div>
          <span class="btn-label">Send Reset Link</span>
        </button>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBaRMQBLfDyufJkC4E8XCvzOIMEawOQObw",
      authDomain: "haulxify-app.firebaseapp.com",
      projectId: "haulxify-app",
      storageBucket: "haulxify-app.firebasestorage.app",
      messagingSenderId: "453228026261",
      appId: "1:453228026261:web:1d66ab1d47418906807e9c"
    });

    const auth = firebase.auth();

    auth.onAuthStateChanged(function(user) {
      if (user) window.location.href = 'index.html';
    });

    function handleSignIn() {
      var email    = document.getElementById('signin-email').value.trim();
      var password = document.getElementById('signin-password').value;
      var btn      = document.getElementById('signin-btn');
      var errorBox = document.getElementById('signin-error');
      var errorMsg = document.getElementById('signin-error-msg');

      errorBox.classList.remove('show');

      if (!email) {
        errorMsg.textContent = 'Please enter your email address.';
        errorBox.classList.add('show');
        document.getElementById('signin-email').focus();
        return;
      }
      if (!password) {
        errorMsg.textContent = 'Please enter your password.';
        errorBox.classList.add('show');
        document.getElementById('signin-password').focus();
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      var persistence = document.getElementById('signin-remember').checked
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;

      auth.setPersistence(persistence)
        .then(function() { return auth.signInWithEmailAndPassword(email, password); })
        .then(function() { window.location.href = 'index.html'; })
        .catch(function() {
          btn.classList.remove('loading');
          btn.disabled = false;
          errorMsg.textContent = 'Incorrect email or password. Please try again.';
          errorBox.classList.add('show');
          document.getElementById('signin-password').value = '';
          document.getElementById('signin-password').focus();
        });
    }

function openForgot() {
  var email = document.getElementById('signin-email').value.trim();
  if (email) document.getElementById('reset-email').value = email;
  document.getElementById('reset-error').classList.remove('show');
  document.getElementById('reset-btn').classList.remove('loading');
  document.getElementById('reset-btn').disabled = false;
  document.getElementById('forgot-overlay').classList.add('show');
  setTimeout(function() { document.getElementById('reset-email').focus(); }, 100);
}

    function closeForgot() {
      document.getElementById('forgot-overlay').classList.remove('show');
    }

    function sendReset() {
      var email  = document.getElementById('reset-email').value.trim();
      var btn    = document.getElementById('reset-btn');
      var errBox = document.getElementById('reset-error');
      var errMsg = document.getElementById('reset-error-msg');

      errBox.classList.remove('show');

      if (!email) {
        errMsg.textContent = 'Please enter your email address.';
        errBox.classList.add('show');
        document.getElementById('reset-email').focus();
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      auth.sendPasswordResetEmail(email)
.then(function() {
  closeForgot();
  var errorBox = document.getElementById('signin-error');
  var errorMsg = document.getElementById('signin-error-msg');
  errorBox.className = 'alert-box success show';
  errorMsg.textContent = 'A secure reset link has been sent to your email. If it’s not in your inbox, it may be in your spam folder.';
})
        .catch(function() {
          btn.classList.remove('loading');
          btn.disabled = false;
          errMsg.textContent = 'Could not send reset email. Please check the address.';
          errBox.classList.add('show');
        });
    }

    function togglePw() {
      var pw   = document.getElementById('signin-password');
      var icon = document.getElementById('pw-eye');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        pw.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }
document.getElementById('signin-email').addEventListener('input', function() {
  document.getElementById('signin-error').classList.remove('show');
});
document.getElementById('signin-password').addEventListener('input', function() {
  document.getElementById('signin-error').classList.remove('show');
});
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeForgot();
      if (e.key === 'Enter') {
        if (document.getElementById('forgot-overlay').classList.contains('show')) sendReset();
        else handleSignIn();
      }
    });
  </script>

</body>
</html>
