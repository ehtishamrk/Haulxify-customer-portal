<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haulxify — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b1120;
      --bg-card:   #111827;
      --bg-input:  #162033;
      --border:    rgba(255,255,255,0.08);
      --border-focus: #f97316;
      --orange:    #f97316;
      --orange-h:  #fb923c;
      --text:      #f0f4ff;
      --muted:     rgba(240,244,255,0.45);
      --error-bg:  rgba(239,68,68,0.12);
      --error:     #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      display: block;
      text-align: center;
      margin-bottom: 2rem;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--orange); }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2rem 2rem;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
      color: var(--text);
    }
    .card-sub {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    /* Form */
    .form-group {
      margin-bottom: 1.1rem;
    }
    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.8rem;
      pointer-events: none;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 0.7rem 2.75rem 0.7rem 2.5rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--border-focus);
    }
    input::placeholder { color: var(--muted); }

    .toggle-pw {
      position: absolute;
      right: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text); }

    /* Error */
    .error-msg {
      display: none;
      background: var(--error-bg);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 0.6rem 0.875rem;
      font-size: 0.8125rem;
      color: var(--error);
      margin-bottom: 1rem;
      align-items: center;
      gap: 0.5rem;
    }
    .error-msg.show { display: flex; }

    /* Remember + forgot row */
    .row-extras {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.4rem;
      font-size: 0.8125rem;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      cursor: pointer;
    }
    .remember input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--orange);
      padding: 0;
    }
    .forgot {
      color: var(--orange);
      text-decoration: none;
      font-size: 0.8125rem;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--orange-h); }

    /* Button */
    .btn-login {
      width: 100%;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9375rem;
      font-weight: 700;
      padding: 0.75rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      letter-spacing: 0.01em;
    }
    .btn-login:hover { background: var(--orange-h); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Demo badge */
    .demo-box {
      background: rgba(249,115,22,0.07);
      border: 1px solid rgba(249,115,22,0.2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.8125rem;
      color: rgba(249,115,22,0.9);
      text-align: center;
      line-height: 1.6;
    }
    .demo-box strong {
      color: var(--orange);
      font-weight: 600;
      font-family: 'DM Mono', 'Courier New', monospace;
    }

    /* Footer note */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .login-footer a { color: var(--orange); text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }

    /* shake animation on error */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

<div class="login-wrap">

  <a href="https://haulxify.com" class="logo">Haul<span>xify</span></a>

  <div class="card" id="card">
    <p class="card-title">Welcome back</p>
    <p class="card-sub">Sign in to your customer portal</p>

    <div class="error-msg" id="error-msg">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="error-text">Invalid email or password. Please try again.</span>
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock input-icon"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pw" onclick="togglePw()" type="button" id="pw-toggle" aria-label="Toggle password">
          <i class="fa-solid fa-eye" id="pw-icon"></i>
        </button>
      </div>
    </div>

    <div class="row-extras">
      <label class="remember">
        <input type="checkbox" id="remember"> Remember me
      </label>
      <a href="#" class="forgot" onclick="showForgot(event)">Forgot password?</a>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <span class="btn-text"><i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In</span>
      <div class="spinner"></div>
    </button>

    <div class="divider">demo credentials</div>

    <div class="demo-box">
      Email: <strong>admin@haulxify.com</strong><br>
      Password: <strong>Haulxify2025!</strong>
    </div>
  </div>

  <p class="login-footer">
    Need access? <a href="mailto:support@haulxify.com">Contact support</a> &nbsp;·&nbsp;
    <a href="https://haulxify.com">Back to website</a>
  </p>

</div>

<script>
  const CREDENTIALS = {
    email: 'admin@haulxify.com',
    password: 'Haulxify2025!'
  };

  function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');
    const errBox   = document.getElementById('error-msg');
    const errTxt   = document.getElementById('error-text');

    errBox.classList.remove('show');

    if (!email || !password) {
      errTxt.textContent = 'Please enter both email and password.';
      errBox.classList.add('show');
      document.getElementById('card').classList.add('shake');
      setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      if (email === CREDENTIALS.email && password === CREDENTIALS.password) {
        if (document.getElementById('remember').checked) {
          localStorage.setItem('hx_logged_in', '1');
        } else {
          sessionStorage.setItem('hx_logged_in', '1');
        }
        window.location.href = 'index.html';
      } else {
        btn.classList.remove('loading');
        btn.disabled = false;
        errTxt.textContent = 'Invalid email or password. Please try again.';
        errBox.classList.add('show');
        document.getElementById('card').classList.add('shake');
        setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);
      }
    }, 900);
  }

  function togglePw() {
    const inp  = document.getElementById('password');
    const icon = document.getElementById('pw-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.className = 'fa-solid fa-eye-slash';
    } else {
      inp.type = 'password';
      icon.className = 'fa-solid fa-eye';
    }
  }

  function showForgot(e) {
    e.preventDefault();
    const errBox = document.getElementById('error-msg');
    const errTxt = document.getElementById('error-text');
    errTxt.textContent = 'Password reset is not available in demo mode.';
    errBox.classList.add('show');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  (function checkAlreadyLoggedIn() {
    if (localStorage.getItem('hx_logged_in') || sessionStorage.getItem('hx_logged_in')) {
      window.location.href = 'index.html';
    }
  })();
</script>

</body>
</html>
